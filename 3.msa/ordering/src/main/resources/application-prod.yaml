server:
  port: 8080

eureka:
  client:
    enabled: false
product:
  service:
    url: "http://product-service"
spring:
  config:
    activate:
      on-profile: prod
  application:
    name: ordering-service
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver  #드라이버
    url: jdbc:mariadb://${DB_HOST}:3306/ordermsa?useSSL=true&verifyServerCertificate=false  #mariadb 주소 / 스키마명
    username: admin
    password: ${DB_PW}
#    운영db의 낮은 스펙과 msa에 많은 커넥션을 감안한 커넥션 축소 설정
    hikari:
      maximum-pool-size: 1
  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MariaDBDialect
    generate-ddl: true
    hibernate:
      ddl-auto: create

    show_sql: true
  redis:
    host: redis-service
    port: 6379
  kafka:
    kafka-server: kafka-service:9092